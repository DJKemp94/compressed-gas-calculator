<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 60 620 620" width="100%" height="100%">
  <defs>
    <!-- Cylinder body: muted amber-bronze -->
    <linearGradient id="cylinderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8C6B2A" />
      <stop offset="20%" stop-color="#B8963E" />
      <stop offset="45%" stop-color="#D4B06A" />
      <stop offset="80%" stop-color="#B8963E" />
      <stop offset="100%" stop-color="#7A5D1F" />
    </linearGradient>

    <!-- Brass fittings: warmer, desaturated -->
    <linearGradient id="brassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D9CBA8" />
      <stop offset="15%" stop-color="#B8A060" />
      <stop offset="50%" stop-color="#8C7A45" />
      <stop offset="85%" stop-color="#6B5C30" />
      <stop offset="100%" stop-color="#4A3F20" />
    </linearGradient>

    <!-- Brass pipe: subtle highlight -->
    <linearGradient id="brassPipe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8A060" />
      <stop offset="30%" stop-color="#D9CBA8" />
      <stop offset="70%" stop-color="#9A8650" />
      <stop offset="100%" stop-color="#5C4E2A" />
    </linearGradient>
    
    <!-- Chrome/steel: cool metallic -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F0F0" />
      <stop offset="40%" stop-color="#C8CDD0" />
      <stop offset="100%" stop-color="#6B7B82" />
    </linearGradient>

    <g id="gas-puff">
      <circle cx="0" cy="0" r="14" fill="#9BBCD4" />
      <circle cx="16" cy="-10" r="18" fill="#9BBCD4" />
      <circle cx="28" cy="4" r="16" fill="#9BBCD4" />
      <circle cx="12" cy="14" r="14" fill="#9BBCD4" />
      <path d="M -8,2 A 14,14 0 0,0 12,12 A 12,12 0 0,0 24,14 A 14,14 0 0,0 40,2 A 16,16 0 0,1 -8,2 Z" fill="#6F9AB5" opacity="0.9"/>
    </g>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Hose: dark wine/maroon -->
  <g filter="url(#shadow)">
    <path d="M 400 260 C 530 260, 600 310, 580 650" stroke="#2C3440" stroke-width="36" fill="none" />
    <path d="M 400 260 C 530 260, 600 310, 580 650" stroke="#7A3045" stroke-width="28" fill="none" />
    <path d="M 400 260 C 530 260, 600 310, 580 650" stroke="#B8607A" stroke-width="5" fill="none" transform="translate(-5, -3)" opacity="0.6" />
    <path d="M 400 260 C 530 260, 600 310, 580 650" stroke="#501828" stroke-width="2" fill="none" transform="translate(5, 2)" stroke-dasharray="10 14" />
  </g>

  <!-- Cylinder body -->
  <g filter="url(#shadow)">
    <path d="M 60,450 C 60,330 280,330 280,450 L 280,650 L 60,650 Z" fill="url(#cylinderGrad)" stroke="#2C3E50" stroke-width="4" />
    
    <rect x="145" y="315" width="50" height="40" fill="url(#cylinderGrad)" stroke="#2C3E50" stroke-width="3.5" rx="3" />
    <line x1="145" y1="326" x2="195" y2="326" stroke="#2C3E50" stroke-width="2" />
    <line x1="145" y1="336" x2="195" y2="336" stroke="#2C3E50" stroke-width="2" />
    <line x1="145" y1="346" x2="195" y2="346" stroke="#2C3E50" stroke-width="2" />
    
    <rect x="152" y="290" width="36" height="25" fill="url(#chromeGrad)" stroke="#2C3E50" stroke-width="3.5" />
    
    <rect x="155" y="210" width="30" height="80" fill="url(#brassGrad)" stroke="#2C3E50" stroke-width="3.5" rx="2" />
    <rect x="135" y="245" width="20" height="18" fill="url(#brassGrad)" stroke="#2C3E50" stroke-width="3.5" rx="2" />
    
    <rect x="162" y="190" width="16" height="20" fill="url(#brassPipe)" stroke="#2C3E50" stroke-width="3.5" />
    
    <rect x="130" y="175" width="80" height="15" fill="#34495E" stroke="#1C2833" stroke-width="3" rx="4" />
    <circle cx="170" cy="182" r="12" fill="#2C3E50" stroke="#1C2833" stroke-width="2" />
    <rect x="135" y="171" width="10" height="5" fill="#7F8C8D" rx="2" /> 
  </g>

  <!-- Regulator pipes -->
  <g filter="url(#shadow)">
    <rect x="185" y="248" width="50" height="24" fill="url(#brassPipe)" stroke="#2C3E50" stroke-width="3.5" />
    <rect x="190" y="240" width="16" height="40" fill="url(#brassGrad)" stroke="#2C3E50" stroke-width="3.5" rx="2" />

    <rect x="335" y="248" width="60" height="24" fill="url(#brassPipe)" stroke="#2C3E50" stroke-width="3.5" />

    <circle cx="290" cy="260" r="50" fill="url(#brassGrad)" stroke="#2C3E50" stroke-width="3.5" />
    <circle cx="290" cy="260" r="42" fill="none" stroke="#D9CBA8" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Gauges -->
  <g filter="url(#shadow)">
    <line x1="260" y1="220" x2="220" y2="155" stroke="url(#brassPipe)" stroke-width="14" stroke-linecap="round" />
    <line x1="260" y1="220" x2="220" y2="155" stroke="#2C3E50" stroke-width="18" stroke-linecap="round" opacity="0.5" />
    
    <circle cx="205" cy="125" r="52" fill="url(#chromeGrad)" stroke="#2C3E50" stroke-width="3" />
    <circle cx="205" cy="125" r="44" fill="#FAFAFA" />
    <circle cx="205" cy="125" r="40" fill="none" stroke="#8C9DA6" stroke-width="2" stroke-dasharray="2 4.2" />
    <circle cx="205" cy="125" r="34" fill="none" stroke="#34495E" stroke-width="4" stroke-dasharray="2 16" />
    <path d="M 238 105 A 38 38 0 0 1 215 162" fill="none" stroke="#7A3045" stroke-width="6" stroke-linecap="round"/>
    <polygon points="205,125 201,128 220,95 209,122" fill="#1C2833" />
    <circle cx="205" cy="125" r="5" fill="#2C3E50" />
    <path d="M 170 100 A 42 42 0 0 1 230 95" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.6" stroke-linecap="round" />

    <line x1="320" y1="220" x2="360" y2="155" stroke="url(#brassPipe)" stroke-width="14" stroke-linecap="round" />
    <line x1="320" y1="220" x2="360" y2="155" stroke="#2C3E50" stroke-width="18" stroke-linecap="round" opacity="0.5" />
    
    <circle cx="375" cy="125" r="52" fill="url(#chromeGrad)" stroke="#2C3E50" stroke-width="3" />
    <circle cx="375" cy="125" r="44" fill="#FAFAFA" />
    <circle cx="375" cy="125" r="40" fill="none" stroke="#8C9DA6" stroke-width="2" stroke-dasharray="2 4.2" />
    <circle cx="375" cy="125" r="34" fill="none" stroke="#34495E" stroke-width="4" stroke-dasharray="2 16" />
    <path d="M 408 105 A 38 38 0 0 1 385 162" fill="none" stroke="#7A3045" stroke-width="6" stroke-linecap="round"/>
    <polygon points="375,125 371,128 395,100 379,122" fill="#1C2833" />
    <circle cx="375" cy="125" r="5" fill="#2C3E50" />
    <path d="M 340 100 A 42 42 0 0 1 400 95" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.6" stroke-linecap="round" />
  </g>

  <!-- Central knob + outlet -->
  <g filter="url(#shadow)">
    <circle cx="290" cy="260" r="38" fill="#34495E" stroke="#2C3E50" stroke-width="3.5" />
    <circle cx="290" cy="260" r="36" fill="none" stroke="#1C2833" stroke-width="4" stroke-dasharray="4 5" />
    <circle cx="290" cy="260" r="22" fill="#3D566E" stroke="#2C3E50" stroke-width="3" />
    <circle cx="290" cy="260" r="10" fill="#2C3E50" />
    
    <polygon points="390,238 420,238 430,250 430,270 420,282 390,282" fill="url(#brassGrad)" stroke="#2C3E50" stroke-width="3.5" stroke-linejoin="round" />
    <line x1="405" y1="238" x2="405" y2="282" stroke="#2C3E50" stroke-width="2" opacity="0.5" />
    <line x1="418" y1="243" x2="418" y2="277" stroke="#2C3E50" stroke-width="2" opacity="0.3" />
    <path d="M 420 245 Q 425 250 422 265" stroke="#D9CBA8" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Animated gas puffs -->
  <g id="leak-origin" transform="translate(425, 255)">
    <ellipse cx="0" cy="0" rx="6" ry="14" fill="#6F9AB5" opacity="0.8" />

    <g opacity="0">
      <animate attributeName="opacity" values="0; 0.8; 0" dur="3s" repeatCount="indefinite" begin="0s" />
      <use href="#gas-puff">
        <animate attributeName="x" values="0; 60" dur="3s" repeatCount="indefinite" begin="0s" />
        <animate attributeName="y" values="0; -30" dur="3s" repeatCount="indefinite" begin="0s" />
        <animateTransform attributeName="transform" type="scale" values="0.3; 2.2" dur="3s" repeatCount="indefinite" begin="0s" />
      </use>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0; 0.75; 0" dur="3.5s" repeatCount="indefinite" begin="1s" />
      <use href="#gas-puff">
        <animate attributeName="x" values="0; 80" dur="3.5s" repeatCount="indefinite" begin="1s" />
        <animate attributeName="y" values="5; 20" dur="3.5s" repeatCount="indefinite" begin="1s" />
        <animateTransform attributeName="transform" type="scale" values="0.4; 1.8" dur="3.5s" repeatCount="indefinite" begin="1s" />
      </use>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0; 0.8; 0" dur="4s" repeatCount="indefinite" begin="2s" />
      <use href="#gas-puff">
        <animate attributeName="x" values="0; 100" dur="4s" repeatCount="indefinite" begin="2s" />
        <animate attributeName="y" values="-5; -10" dur="4s" repeatCount="indefinite" begin="2s" />
        <animateTransform attributeName="transform" type="scale" values="0.2; 2.5" dur="4s" repeatCount="indefinite" begin="2s" />
      </use>
    </g>

    <circle cx="0" cy="0" r="5" fill="#9BBCD4" stroke="#6F9AB5" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0; 0.9; 0" dur="2.5s" repeatCount="indefinite" begin="0.2s" />
      <animate attributeName="cx" values="10; 50" dur="2.5s" repeatCount="indefinite" begin="0.2s" />
      <animate attributeName="cy" values="-5; -60" dur="2.5s" repeatCount="indefinite" begin="0.2s" />
      <animate attributeName="r" values="1; 8" dur="2.5s" repeatCount="indefinite" begin="0.2s" />
    </circle>

    <circle cx="0" cy="0" r="4" fill="#9BBCD4" stroke="#4A8BA8" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0; 0.85; 0" dur="2s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="cx" values="5; 70" dur="2s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="cy" values="5; -40" dur="2s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="r" values="2; 10" dur="2s" repeatCount="indefinite" begin="1.5s" />
    </circle>
  </g>

</svg>