<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500" width="100%" height="100%" style="background-color: #ffffff;">
  <defs>
    <clipPath id="tank-clip">
      <rect x="50" y="100" width="100" height="350" rx="40" />
    </clipPath>
    <linearGradient id="vapor-grad" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:#9adbc9;stop-opacity:0.1" />
        <stop offset="100%" style="stop-color:#9adbc9;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <ellipse cx="100" cy="460" rx="60" ry="10" fill="#e2e8f0" />

  <rect x="50" y="100" width="100" height="350" rx="40" fill="#dbebe4" />

  <g clip-path="url(#tank-clip)">
    
    <rect x="50" y="100" width="100" height="200" fill="url(#vapor-grad)">
       <animate attributeName="opacity" values="0.6;1;0.6" dur="8s" repeatCount="indefinite" />
    </rect>

    <g fill="#f0fcf9" style="mix-blend-mode: overlay;">
      <circle cx="80" cy="200" r="12">
        <animate attributeName="cy" values="280; 100" dur="6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.8; 0" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="120" cy="220" r="18">
        <animate attributeName="cy" values="280; 120" dur="8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.7; 0" dur="8s" repeatCount="indefinite" />
      </circle>
      <circle cx="100" cy="180" r="8">
        <animate attributeName="cy" values="280; 110" dur="5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.9; 0" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="65" cy="250" r="15">
        <animate attributeName="cy" values="290; 130" dur="7s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.6; 0" dur="7s" repeatCount="indefinite" />
      </circle>
    </g>

    <path fill="#66ad96" d="M -100 285 Q -75 295, -50 285 T 0 285 T 50 285 T 100 285 T 150 285 T 200 285 L 200 500 L -100 500 Z">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-100 0" dur="4s" repeatCount="indefinite" />
    </path>

    <path fill="#89ccb8" d="M -100 295 Q -75 285, -50 295 T 0 295 T 50 295 T 100 295 T 150 295 T 200 295 L 200 500 L -100 500 Z">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="5s" repeatCount="indefinite" />
    </path>

    <g fill="#ffffff">
      <circle cx="70" cy="450" r="3" opacity="0.6">
        <animate attributeName="cy" values="450; 290" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.8; 0" dur="2.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="110" cy="430" r="2.5" opacity="0.6">
        <animate attributeName="cy" values="430; 290" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.6; 0" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="90" cy="480" r="4" opacity="0.6">
        <animate attributeName="cy" values="480; 290" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.9; 0" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="130" cy="460" r="2" opacity="0.6">
        <animate attributeName="cy" values="460; 290" dur="2.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.7; 0" dur="2.8s" repeatCount="indefinite" />
      </circle>
    </g>

    <rect x="96" y="80" width="8" height="350" fill="#2a353c" opacity="0.8" />
  </g>

  <rect x="58" y="108" width="12" height="334" rx="6" fill="#ffffff" opacity="0.5" />
  <rect x="135" y="108" width="5" height="334" rx="2.5" fill="#ffffff" opacity="0.3" />
  
  <rect x="50" y="100" width="100" height="350" rx="40" fill="none" stroke="#8c9fab" stroke-width="4" />

  <rect x="85" y="85" width="30" height="20" fill="#8c9fab" stroke="#1d2931" stroke-width="4" stroke-linejoin="round"/>

  <polygon points="75,25 125,25 115,85 85,85" fill="none" stroke="#1d2931" stroke-width="6" stroke-linejoin="round" />
  <polygon points="75,25 125,25 115,85 85,85" fill="#ffffff" opacity="0.1" />

  <rect x="93" y="25" width="14" height="60" fill="#ffc107" rx="2"/>
  <rect x="85" y="25" width="30" height="6" fill="#ffc107" rx="1"/>
  <rect x="107" y="50" width="10" height="12" fill="#ffc107" rx="1"/>
  <rect x="117" y="52" width="6" height="8" fill="#d4a004" rx="1"/>
  
</svg>