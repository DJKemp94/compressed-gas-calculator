<svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Particle Stream Animations */
      .stream {
        fill: none;
        stroke-linecap: round;
      }
      
      /* Increased stroke-width for larger particles and updated dasharray/offset for seamless looping */
      .p-fast {
        stroke: #00b4d8;
        stroke-width: 7;
        stroke-dasharray: 0.1 39.9;
        animation: flow-fast 3s linear infinite;
        opacity: 0.9;
      }
      .p-med {
        stroke: #48cae4;
        stroke-width: 5.5;
        stroke-dasharray: 0.1 49.9;
        animation: flow-med 4.5s linear infinite;
        opacity: 0.75;
      }
      .p-slow {
        stroke: #90e0ef;
        stroke-width: 4;
        stroke-dasharray: 0.1 59.9;
        animation: flow-slow 6s linear infinite;
        opacity: 0.65;
      }

      @keyframes flow-fast { to { stroke-dashoffset: -160; } }
      @keyframes flow-med { to { stroke-dashoffset: -200; } } 
      @keyframes flow-slow { to { stroke-dashoffset: -240; } }

      /* Realistic Bunsen Burner Flicker */
      .flame-outer {
        transform-origin: 0px 0px; 
        animation: flicker-outer 0.15s ease-in-out infinite alternate;
      }
      .flame-inner {
        transform-origin: 0px 0px; 
        animation: flicker-inner 0.08s ease-in-out infinite alternate;
      }
      
      @keyframes flicker-outer {
        0% { transform: scaleY(0.95) scaleX(1.05); opacity: 0.7; }
        100% { transform: scaleY(1.1) scaleX(0.95); opacity: 0.9; }
      }
      @keyframes flicker-inner {
        0% { transform: scaleY(0.9); opacity: 0.9; }
        100% { transform: scaleY(1.15); opacity: 1; }
      }
    </style>

    <linearGradient id="chemPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc0099" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="chemGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00cc00" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="chemBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00cccc" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <g id="room-structure">
    <path d="M 100,350 L 400,500 L 700,350 L 400,200 Z" fill="#f0f2f5" />
    <path d="M 160,320 L 460,470 M 220,290 L 520,440 M 280,260 L 580,410 M 340,230 L 640,380" stroke="#e8eaed" stroke-width="1.5" fill="none"/>
    <path d="M 160,380 L 460,230 M 220,410 L 520,260 M 280,440 L 580,290 M 340,470 L 640,320" stroke="#e8eaed" stroke-width="1.5" fill="none"/>
    
    <path d="M 100,350 L 400,200 L 400,0 L 100,150 Z" fill="#e8eaed" />
    <path d="M 400,200 L 700,350 L 700,150 L 400,0 Z" fill="#f8f9fa" />
    <path d="M 100,350 L 400,500 L 700,350 L 700,370 L 400,520 L 100,370 Z" fill="#cbd0d5" />

    <g transform="translate(150, 60)">
        <path d="M 0,20 L 60,50 L 60,30 L 0,0 Z" fill="#bdc1c6"/>
        <path d="M 0,20 L 80,-20 L 140,10 L 60,50 Z" fill="#dadce0"/>
        <path d="M 10,15 L 70,-15 M 20,20 L 80,-10 M 30,25 L 90,-5" stroke="#9aa0a6" stroke-width="2"/>
    </g>
  </g>

  <g id="particles-background">
    <path class="stream p-fast" d="M 160,70 C 250,90 350,120 460,160" />
    <path class="stream p-med"  d="M 170,80 C 260,150 350,150 480,180" />
    <path class="stream p-slow" d="M 150,60 C 300,40 400,100 470,140" />
    <path class="stream p-fast" d="M 180,90 C 250,180 350,190 470,190" />
    <path class="stream p-med"  d="M 190,70 C 280,80 380,110 490,150" />
    <path class="stream p-slow" d="M 140,80 C 200,140 280,160 450,170" />
  </g>

  <g id="left-cabinets" transform="translate(180, 150)">
    <path d="M 0,120 L 40,140 L 40,40 L 0,20 Z" fill="#bdc1c6" />
    <path d="M 40,140 L 120,100 L 120,0 L 40,40 Z" fill="#dadce0" />
    <path d="M 0,20 L 40,40 L 120,0 L 80,-20 Z" fill="#f1f3f4" />
    <line x1="80" y1="0" x2="80" y2="120" stroke="#bdc1c6" stroke-width="1"/>
    <line x1="55" y1="60" x2="55" y2="80" stroke="#5f6368" stroke-width="2" stroke-linecap="round"/>
    <line x1="105" y1="45" x2="105" y2="65" stroke="#5f6368" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g id="fume-hood-back" transform="translate(420, 80)">
    <path d="M 0,160 L 100,210 L 140,190 L 40,140 Z" fill="#3c4043" />
    <path d="M 0,160 L 0,220 L 100,270 L 100,210 Z" fill="#bdc1c6" />
    <path d="M 100,210 L 140,190 L 140,250 L 100,270 Z" fill="#9aa0a6" />
    <path d="M 40,140 L 140,190 L 140,50 L 40,0 Z" fill="#dadce0" />
    <path d="M 0,20 L 100,70 L 140,50 L 40,0 Z" fill="#f1f3f4" />
    <path d="M -10,15 L 90,65 L 90,15 L -10,-35 Z" fill="#dadce0" />
    <path d="M 90,65 L 130,45 L 130,-5 L 90,15 Z" fill="#bdc1c6" />
    <path d="M 50,110 L 110,140 L 110,120 L 50,90 Z" fill="#9aa0a6"/>
    <path d="M 60,115 L 100,135 M 70,110 L 100,125" stroke="#5f6368" stroke-width="1"/>

    <g transform="translate(70, 150)">
        <path d="M 0,10 L 30,25 L 50,15 L 20,0 Z" fill="#5f6368"/>
        <path d="M 0,10 L 0,15 L 30,30 L 30,25 Z" fill="#3c4043"/>
        <path d="M 25,12 L 35,17 L 32,5 L 28,5 Z" fill="url(#chemBlue)" opacity="0.7"/>
        <circle cx="30" cy="15" r="8" fill="url(#chemBlue)" opacity="0.6"/>
    </g>
  </g>

  <g id="center-bench-group" transform="translate(240, 260)">
    <path d="M 0,40 L 160,120 L 220,90 L 60,10 Z" fill="#3c4043" />
    <path d="M 0,40 L 160,120 L 160,160 L 0,80 Z" fill="#dadce0" />
    <path d="M 160,120 L 220,90 L 220,130 L 160,160 Z" fill="#bdc1c6" />
    
    <g transform="translate(40, 50)">
      <path d="M 0,20 L 20,30 L 16,10 L 4,10 Z" fill="url(#chemPink)" opacity="0.8"/>
      <path d="M -5,30 L 25,30 L 18,-10 L 2,-10 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(80, 70)">
        <path d="M 0,15 L 15,22.5 L 12,8 L 3,8 Z" fill="url(#chemGreen)" opacity="0.8"/>
        <path d="M -3,22.5 L 18,22.5 L 14,-5 L 1,-5 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(140, 40)">
        <rect x="0" y="30" width="30" height="5" transform="skewY(30)" fill="#5f6368"/>
        <line x1="15" y1="30" x2="15" y2="-40" stroke="#9aa0a6" stroke-width="3"/>
        <line x1="15" y1="0" x2="-5" y2="10" stroke="#5f6368" stroke-width="2"/>
        <rect x="-8" y="-20" width="4" height="40" fill="url(#chemBlue)" opacity="0.6"/>
    </g>
    
    <g transform="translate(110, 60)">
        <rect x="0" y="20" width="15" height="5" transform="skewY(30)" fill="#5f6368"/>
        <rect x="5" y="5" width="5" height="20" fill="#9aa0a6"/>
        <g transform="translate(7.5, 5)">
            <path class="flame-outer" d="M -4,0 Q -6,-12 0,-20 Q 6,-12 4,0 Z" fill="#00b4d8" opacity="0.6"/>
            <path class="flame-inner" d="M -2,0 Q -3,-8 0,-14 Q 3,-8 2,0 Z" fill="#e0ffff"/>
        </g>
    </g>
  </g>

  <g id="particles-foreground">
    <path class="stream p-med"  d="M 150,100 C 120,300 200,450 350,450 C 450,450 480,300 480,200" />
    <path class="stream p-slow" d="M 160,110 C 140,350 250,480 400,430 C 480,400 500,250 490,200" />
    <path class="stream p-fast" d="M 140,90 C 100,250 150,380 250,380 C 350,380 440,300 460,220" />
    <path class="stream p-slow" d="M 130,80 C 50,220 180,420 300,420 C 420,420 460,320 470,210" />
    
    <path class="stream p-fast" d="M 170,90 C 200,250 300,280 400,250 C 450,230 460,200 470,190" />
    <path class="stream p-med"  d="M 160,100 C 180,280 280,330 420,280 C 470,260 480,220 480,200" />
    <path class="stream p-slow" d="M 180,110 C 220,300 320,320 440,260 C 480,240 490,210 490,190" />
  </g>

  <g id="fume-hood-glass" transform="translate(420, 80)">
    <path d="M 0,160 L 40,140 L 40,0 L -10,-25 L -10,155 Z" fill="#aee0eb" opacity="0.3" stroke="#ffffff" stroke-width="1"/>
    <path d="M -10,50 L 90,100 L 90,220 L -10,170 Z" fill="#aee0eb" opacity="0.4" stroke="#ffffff" stroke-width="2"/>
    <path d="M -10,170 L 90,220 L 90,230 L -10,180 Z" fill="#9aa0a6"/>
  </g>
</svg>